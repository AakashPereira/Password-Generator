<html>
    <head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <link rel="stylesheet" href="src/index.css">
        <title>Password Generator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="container">
            <h1 role="text">Generate a <span class="highlight">random password</span></h1>
            <p id="intro">Never use an insecure password again.</p>
                
            <div class="form-input">
                <label for="maxLength">Length:</label>
                <input type="range" min="5" max="15" id="maxLength">
            </div>
            <div class="form-input">
                <label for="includeChars">Include Characters?</label>
                <input type="checkbox" id="includeChars">
            </div>
            <button id="generate-btn">Generate passwords</button>
            
            <hr>
            
            <div class="pwd-container">
                <div class="password" id="pwdOne" tabindex="0" role="button" aria-label="Copy password 1"></div>
                <div class="password" id="pwdTwo" tabindex="0" role="button" aria-label="Copy password 2"></div>
            </div>
            
            <p id="status" class="highlight" role="status"><p>
        </div>
        
        <script src="src/index.js"></script>
    </body>
</html>
